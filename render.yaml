services:
  # Backend API Service
  - type: web
    name: ai-callcenter-backend
    env: node
    region: oregon
    plan: starter # $7/month - upgrade to standard ($25/mo) for better performance
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false # Set in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 24h
      - key: JWT_REFRESH_EXPIRE
        value: 7d
      - key: AI_SERVICE_URL
        fromService:
          type: web
          name: ai-callcenter-ai-service
          envVarKey: RENDER_EXTERNAL_URL
      - key: UPLOAD_DIR
        value: /opt/render/project/src/uploads
      - key: MAX_FILE_SIZE
        value: 52428800
      - key: REDIS_HOST
        fromService:
          type: redis
          name: ai-callcenter-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: ai-callcenter-redis
          property: port
      - key: WORKER_CONCURRENCY
        value: 2
      - key: LOG_LEVEL
        value: info
      - key: FILE_RETENTION_DAYS
        value: 30
    healthCheckPath: /api/health
    autoDeploy: true

  # AI Service (Python FastAPI)
  - type: web
    name: ai-callcenter-ai-service
    env: python
    region: oregon
    plan: standard # $25/month MINIMUM - needs 2GB+ RAM for AI models
    buildCommand: cd ai-service && pip install -r requirements.txt && python -m spacy download en_core_web_sm
    startCommand: cd ai-service && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8000
      - key: HOST
        value: 0.0.0.0
      - key: ALLOWED_ORIGINS
        value: https://your-frontend.vercel.app,https://ai-callcenter-backend.onrender.com
      - key: WHISPER_MODEL
        value: base # Use 'base' instead of 'medium' to fit in 2GB RAM
      - key: SENTIMENT_MODEL
        value: distilbert-base-uncased-finetuned-sst-2-english
      - key: SUMMARIZATION_MODEL
        value: facebook/bart-large-cnn
      - key: DEVICE
        value: cpu # Render doesn't provide GPU on standard plans
      - key: HF_TOKEN
        sync: false # Set in Render dashboard
      - key: MAX_WORKERS
        value: 2
    healthCheckPath: /health
    autoDeploy: true
    disk:
      name: ai-models-cache
      mountPath: /opt/render/.cache
      sizeGB: 5 # Cache for model downloads

  # Background Worker
  - type: worker
    name: ai-callcenter-worker
    env: node
    region: oregon
    plan: starter # $7/month
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm run worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: AI_SERVICE_URL
        fromService:
          type: web
          name: ai-callcenter-ai-service
          envVarKey: RENDER_EXTERNAL_URL
      - key: REDIS_HOST
        fromService:
          type: redis
          name: ai-callcenter-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: ai-callcenter-redis
          property: port
      - key: WORKER_CONCURRENCY
        value: 2
      - key: WORKER_ID
        value: render-worker-1
      - key: LOG_LEVEL
        value: info
    autoDeploy: true

  # Redis Instance
  - type: redis
    name: ai-callcenter-redis
    region: oregon
    plan: starter # $7/month - 25MB RAM
    maxmemoryPolicy: allkeys-lru
    ipAllowList: [] # Allow connections from Render services only
