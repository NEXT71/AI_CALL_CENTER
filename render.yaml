# Render Configuration for AI Call Center Backend
# This file configures your Render service with persistent storage and FFmpeg

services:
  - type: web
    name: ai-call-center-backend
    env: node
    region: oregon # Change to your preferred region
    plan: starter # or 'free' for free tier
    
    # Build command - just install dependencies
    buildCommand: npm install
    
    # Start command
    startCommand: npm start
    
    # Health check
    healthCheckPath: /health
    
    # Environment variables
    envVars:
      - key: NODE_ENV
        value: production
      
      - key: UPLOAD_DIR
        value: /app/uploads/calls
      
      - key: PORT
        value: 5000
      
      # Add other environment variables from your Render dashboard
      # Don't put secrets here - use Render's Environment Variables UI
      - key: MONGO_URI
        sync: false # This will use the value from Render dashboard
      
      - key: JWT_SECRET
        sync: false
      
      - key: JWT_REFRESH_SECRET
        sync: false
      
      - key: AI_SERVICE_URL
        sync: false
    
    # Persistent Disk for audio file storage
    disk:
      name: call-recordings
      mountPath: /app/uploads
      sizeGB: 10 # Adjust based on your needs - costs $0.25/GB/month

