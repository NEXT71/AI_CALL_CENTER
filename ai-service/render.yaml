services:
  - type: web
    name: ai-callcenter-ai-service
    env: python
    region: oregon
    plan: standard  # $25/month - minimum for AI models (2GB RAM)
    buildCommand: pip install -r requirements.txt && python -m spacy download en_core_web_sm
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8000
      - key: HOST
        value: 0.0.0.0
      - key: ALLOWED_ORIGINS
        value: https://ai-call-center-pt0v.onrender.com,https://ai-call-center-henna.vercel.app,http://localhost:3000,http://localhost:5000
      - key: WHISPER_MODEL
        value: base  # Use 'base' for CPU deployment (fits in 2GB RAM)
      - key: DEVICE
        value: cpu  # Render doesn't provide GPU on standard plans
      - key: SENTIMENT_MODEL
        value: distilbert-base-uncased-finetuned-sst-2-english
      - key: SPACY_MODEL
        value: en_core_web_sm
      - key: SUMMARIZATION_MODEL
        value: facebook/bart-large-cnn
      - key: HF_TOKEN
        sync: false  # Set this in Render dashboard for speaker diarization
    healthCheckPath: /health
    autoDeploy: true
    disk:
      name: ai-models-cache
      mountPath: /opt/render/.cache
      sizeGB: 5  # Cache for model downloads