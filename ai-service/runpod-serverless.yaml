# RunPod Serverless Configuration
# This file defines the serverless endpoint configuration

# Model configuration
model:
  name: "ai-call-center-quality-scoring"
  description: "AI-powered call center quality assurance and compliance monitoring"
  framework: "fastapi"
  container: "qualitypulse/ai-service:latest"

# Runtime configuration
runtime:
  python: "3.10"
  cuda: "12.1"
  gpu: "rtx3090"  # or rtx4090, a100, etc.
  memory: "16GB"   # Adjust based on your needs
  storage: "20GB"  # For model caching

# Scaling configuration
scaling:
  min_instances: 0
  max_instances: 3
  target_concurrency: 1  # One request per instance
  cold_start_timeout: 300  # 5 minutes for model loading

# Health check configuration
health:
  endpoint: "/health"
  interval: 30
  timeout: 15
  start_period: 60

# Environment variables
env:
  - name: "PYTHONPATH"
    value: "/app"
  - name: "TRANSFORMERS_CACHE"
    value: "/tmp/transformers_cache"
  - name: "HF_HOME"
    value: "/tmp/huggingface"
  - name: "CUDA_VISIBLE_DEVICES"
    value: "0"

# Network configuration
network:
  port: 8000
  protocol: "http"

# Resource optimization
optimization:
  enable_gpu: true
  preload_models: true  # Preload AI models on startup
  use_uvloop: true     # Faster async processing